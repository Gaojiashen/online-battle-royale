<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>管理面板 · 密教模拟器S2</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family: system-ui, sans-serif; background:#1a1a2e; color:#e0d8c0; max-width:800px; margin:40px auto; padding:20px; }
h1 { color:#c9a84c; margin-bottom:4px; }
h2 { color:#c9a84c; margin:20px 0 12px; font-size:18px; }
.sub { color:#888; font-size:14px; margin-bottom:24px; }
.card { background:#222240; border:1px solid #333; border-radius:10px; padding:20px; margin-bottom:16px; }
table { width:100%; border-collapse:collapse; }
th, td { padding:8px 12px; text-align:left; border-bottom:1px solid #333; font-size:14px; }
th { color:#c9a84c; font-weight:600; }
.btn { padding:8px 20px; border:none; border-radius:6px; font-size:14px; font-weight:600; cursor:pointer; }
.btn-go { background:#c9a84c; color:#1a1a2e; }
.btn-go:hover { background:#dab95d; }
.btn-go:disabled { background:#555; color:#888; cursor:not-allowed; }
.btn-sm { padding:4px 12px; font-size:12px; background:#444; color:#ccc; border-radius:4px; cursor:pointer; }
input, select { padding:8px 12px; background:#333; border:1px solid #555; color:#e0d8c0; border-radius:6px; font-size:14px; }
input { flex:1; }
select { min-width:150px; }
.row { display:flex; gap:12px; align-items:center; margin:8px 0; }
.result { margin-top:12px; padding:12px; border-radius:6px; font-size:14px; display:none; }
.result.ok { background:rgba(76,175,80,0.2); border:1px solid #4CAF50; display:block; }
.result.err { background:rgba(244,67,54,0.2); border:1px solid #F44336; display:block; }
.empty { color:#666; text-align:center; padding:12px; }
.loading { color:#888; }
.aspect-tag { display:inline-block; background:#333; padding:2px 6px; border-radius:4px; margin:1px; font-size:12px; }
</style>
</head>
<body>
<h1>管理面板</h1>
<p class="sub">密教模拟器S2 — 玩家管理 & 战斗发起</p>

<!-- ═══════════ 玩家列表 ═══════════ -->
<div class="card">
  <div class="row">
    <h2 style="margin:0;flex:1">玩家列表</h2>
    <button class="btn-sm" onclick="loadPlayers()">刷新</button>
  </div>
  <div id="playerList"><span class="loading">加载中...</span></div>
</div>

<!-- ═══════════ 创建玩家 ═══════════ -->
<div class="card">
  <h2>创建玩家</h2>
  <div class="row">
    <input id="newName" placeholder="玩家名称" maxlength="64">
    <button class="btn btn-go" onclick="createPlayer()">创建</button>
  </div>
  <div id="createResult"></div>
</div>

<!-- ═══════════ 发起战斗 ═══════════ -->
<div class="card">
  <h2>发起战斗</h2>
  <div class="row">
    <select id="selA"></select>
    <span style="color:#888;font-weight:bold">VS</span>
    <select id="selB"></select>
    <button class="btn btn-go" onclick="startBattle()">开始战斗</button>
  </div>
  <div id="battleResult"></div>
</div>

<script>
// ═══════════ 通用 ═══════════
function $(id) { return document.getElementById(id); }

async function api(url, method='GET', body) {
  const opts = {method, headers:{'Content-Type':'application/json'}};
  if (body) opts.body = JSON.stringify(body);
  const resp = await fetch(url, opts);
  const data = await resp.json();
  if (!resp.ok) throw new Error(data.detail || JSON.stringify(data));
  return data;
}

// ═══════════ 玩家列表 ═══════════
async function loadPlayers() {
  const div = $('playerList');
  div.innerHTML = '<span class="loading">加载中...</span>';
  try {
    const data = await api('/api/admin/players');
    if (!data.players || data.players.length === 0) {
      div.innerHTML = '<div class="empty">暂无玩家，请先创建</div>';
      updateSelects([]);
      return;
    }
    div.innerHTML = `<table>
      <tr><th>ID</th><th>名称</th><th>性相</th><th>创建时间</th></tr>
      ${data.players.map(p => `<tr>
        <td>${p.id}</td><td><b>${p.name}</b></td>
        <td>${Object.entries(p.aspects||{}).filter(([,v])=>v>0).map(([k,v])=>`<span class="aspect-tag">${k}${v}</span>`).join('')||'<span class="empty">—</span>'}</td>
        <td>${(p.created_at||'').slice(0,10)}</td>
      </tr>`).join('')}
    </table>`;
    updateSelects(data.players);
  } catch(e) {
    div.innerHTML = `<div class="empty">加载失败: ${e.message}</div>`;
  }
}

function updateSelects(players) {
  const opts = players.map(p => `<option value="${p.name}">${p.name}</option>`).join('');
  $('selA').innerHTML = opts;
  $('selB').innerHTML = opts;
}

// ═══════════ 创建玩家 ═══════════
async function createPlayer() {
  const name = $('newName').value.trim();
  if (!name) return alert('请输入玩家名称');
  const div = $('createResult');
  div.className = 'result';
  div.style.display = 'block';
  div.innerHTML = '创建中...';
  try {
    await api('/api/admin/players', 'POST', {name});
    div.className = 'result ok';
    div.innerHTML = `玩家 <b>${name}</b> 创建成功`;
    $('newName').value = '';
    loadPlayers();
  } catch(e) {
    div.className = 'result err';
    div.innerHTML = `创建失败: ${e.message}`;
  }
}

// ═══════════ 发起战斗 ═══════════
async function startBattle() {
  const a = $('selA').value;
  const b = $('selB').value;
  if (!a || !b) return alert('请选择双方玩家');
  if (a === b) return alert('双方不能是同一人');
  const div = $('battleResult');
  div.className = 'result';
  div.style.display = 'block';
  div.innerHTML = '发起中...';
  try {
    const data = await api('/api/battle/init', 'POST', {
      player_a_name: a,
      player_b_name: b,
    });
    div.className = 'result ok';
    div.innerHTML = `对战创建成功！<br>Battle ID: <b>${data.battle_id}</b><br>
      ${a}: ${data.player_a_available?.length||0}张可用 ·
      ${b}: ${data.player_b_available?.length||0}张可用`;
  } catch(e) {
    div.className = 'result err';
    div.innerHTML = `发起失败: ${e.message}`;
  }
}

loadPlayers();
</script>
</body>
</html>
